<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground Tracker – Parent Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="parent-login.css">
</head>

<body>

    <div class="pg-card">
        <div class="pg-top-stripe"></div>

        <div class="pg-header">
            <div class="shield-icon" aria-hidden="true">🛡️</div>
            <div class="pg-badge">👨‍👩‍👧 Parent Portal</div>
            <h1 class="pg-title">Parent <span>Dashboard</span></h1>
            <p class="pg-sub">Monitor your child's playground activities, track progress, and review daily reports.</p>
        </div>

        <!-- <div class="info-banner">
            <span class="icon" aria-hidden="true">💡</span>
            <span>Your child's activity data updates in real time. You'll see points earned, time spent, and today's
                highlights after logging in.</span>
        </div> -->

        <form method="POST" action="/parent-login">

            <div class="pg-field">
                <label for="email">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#4a5568" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                        <path d="m2 7 10 7 10-7" />
                    </svg>
                    Parent Email
                </label>
                <input id="email" type="email" name="email" placeholder="your@email.com" required />
            </div>

            <div class="pg-field">
                <label for="pass">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#4a5568" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    Password
                </label>
                <input id="pass" type="password" name="pass" placeholder="Enter your password" required />
            </div>

            <div class="pg-options">
                <label class="pg-remember">
                    <input type="checkbox" id="showPass"
                        onchange="document.getElementById('pass').type = this.checked ? 'text' : 'password'" />
                    Show password
                </label>
            </div>


            <button type="submit" class="pg-btn">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                Access Parent Dashboard
            </button>

        </form>
        <!-- 
        <div class="kids-row" aria-label="Children linked to this account">
            <div class="kid-chip"><span class="kid-dot"></span> Sara · Active now</div>
            <div class="kid-chip"><span class="kid-dot"></span> Tom · Active now</div>
        </div> -->

        <div class="pg-divider"><span>not a parent?</span></div>

        <a href="../Admin-Login/Login.html" class="pg-child-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            Back to Admin Login
        </a>

    </div>

</body>

</html>
